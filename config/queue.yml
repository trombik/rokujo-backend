---
default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    # The default queue. small jobs and I/O-bound jobs should be queued here.
    - queues: "default"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 2) %>
      polling_interval: 1

    # analysis queue. any jobs that perform NLP analysis (or call remote spacy
    # API server), should be queued here.
    - queues:
        - analysis
      threads: 1
      processes: 2
      polling_interval: 1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
